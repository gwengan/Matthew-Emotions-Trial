<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Matthew's Feelings App</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      touch-action: manipulation;
      overscroll-behavior: none;
      background: #FFF8F0;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      min-height: 100dvh;
      flex-direction: column;
      padding: 20px 20px 36px;
      animation: fadeUp 0.35s ease both;
    }
    .screen.active { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SHARED COMPONENTS ── */
    .back-btn {
      align-self: flex-start;
      background: rgba(0,0,0,0.08);
      border: none;
      font-size: 22px; font-weight: 700;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      color: #555;
      font-family: inherit;
      margin-bottom: 12px;
      transition: background 0.18s;
    }
    .back-btn:active { background: rgba(0,0,0,0.18); }

    .icon-btn {
      background: none; border: none;
      cursor: pointer;
      font-size: 38px; padding: 8px;
      border-radius: 50%; line-height: 1;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .icon-btn:active { transform: scale(0.82); }

    /* Question row (question text + 🔊) */
    .question-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .question-text {
      font-size: 36px; font-weight: 900;
      color: #333; text-align: center;
      line-height: 1.25;
    }

    /* Attempt counter pill */
    .attempt-pill {
      align-self: center;
      background: rgba(0,0,0,0.09);
      border-radius: 30px;
      padding: 8px 22px;
      font-size: 22px; font-weight: 800;
      color: #555;
      min-height: 0;
      margin-bottom: 4px;
    }
    .attempt-pill:empty { display: none; }

    /* Mic section */
    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      flex: 1;
      justify-content: center;
    }

    .mic-label {
      font-size: 26px; font-weight: 700;
      color: #555; text-align: center;
    }

    .mic-btn {
      width: 148px; height: 148px;
      border-radius: 50%;
      background: #E74C3C; border: none;
      font-size: 64px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(231,76,60,0.38);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.14s;
      line-height: 1;
    }
    .mic-btn:active { transform: scale(0.91); }
    .mic-btn.listening {
      background: #C0392B;
      animation: pulse 1.1s ease-in-out infinite;
    }
    .mic-btn:disabled { opacity: 0.5; cursor: default; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0    rgba(231,76,60,0.55); }
      70%  { box-shadow: 0 0 0 32px rgba(231,76,60,0); }
      100% { box-shadow: 0 0 0 0    rgba(231,76,60,0); }
    }

    .rec-status {
      font-size: 24px; color: #555;
      text-align: center;
      min-height: 36px;
      padding: 0 16px;
      line-height: 1.4;
    }

    /* Action row */
    .action-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 84px;
      align-items: center;
    }

    .action-btn {
      min-height: 84px;
      padding: 16px 28px;
      border-radius: 22px;
      font-size: 26px; font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 5px 16px rgba(0,0,0,0.12);
      transition: transform 0.14s, opacity 0.2s;
    }
    .action-btn:active  { transform: scale(0.94); }
    .action-btn:disabled { opacity: 0.4; cursor: default; }

    /* Primary: Try Again — warm orange, for Matthew */
    .btn-retry {
      background: #FF9800; color: white;
      border: none;
    }

    /* Secondary: Override — outlined green, clearly for family */
    .btn-override {
      background: white;
      color: #27A745;
      border: 3px solid #27A745;
    }

    /* Not Yet — outlined red, family use */
    .btn-notyet {
      background: white;
      color: #C0392B;
      border: 3px solid #C0392B;
    }

    /* Written prompt on Say Emotion screen */
    .feel-prompt {
      align-self: center;
      font-size: 42px;
      font-weight: 900;
      color: #333;
      text-align: center;
      background: white;
      border-radius: 20px;
      padding: 18px 32px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      margin-bottom: 4px;
    }

    /* ═══════════════════════════════
       STEP 1 — HOME
    ═══════════════════════════════ */
    #screen-home {
      background: linear-gradient(160deg, #FFF8F0 0%, #FFE9D0 100%);
      align-items: center;
    }

    .home-header {
      display: flex; align-items: center; gap: 12px;
      margin-top: 8px; margin-bottom: 4px;
    }
    .home-title { font-size: 40px; font-weight: 900; color: #333; }
    .home-sub   { font-size: 26px; color: #666; font-weight: 600;
                  text-align: center; margin-bottom: 28px; }

    .emotion-grid-top {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; width: 100%; max-width: 680px; margin-bottom: 16px;
    }
    .emotion-grid-bottom {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 16px; width: 100%; max-width: 452px;
    }

    .emotion-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 150px;
      border-radius: 26px; border: none;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 22px rgba(0,0,0,0.13);
      padding: 18px 10px;
      transition: transform 0.14s, box-shadow 0.14s;
      user-select: none;
    }
    .emotion-card:active {
      transform: scale(0.93);
      box-shadow: 0 3px 10px rgba(0,0,0,0.13);
    }
    .card-emoji { font-size: 64px; line-height: 1.15; margin-bottom: 8px; }
    .card-label { font-size: 26px; font-weight: 800; }

    .emotion-card.happy { background: #FFD700; color: #7A5C00; }
    .emotion-card.sad   { background: #4A90D9; color: #fff; }
    .emotion-card.angry { background: #E74C3C; color: #fff; }
    .emotion-card.tired { background: #9B59B6; color: #fff; }
    .emotion-card.sick  { background: #27AE60; color: #fff; }

    /* ═══════════════════════════════
       STEP 2 — SAY EMOTION
    ═══════════════════════════════ */
    #screen-say-emotion { background: #FFF8F0; align-items: center; }
    #screen-say-emotion .back-btn { align-self: flex-start; }

    /* ═══════════════════════════════
       STEP 3 — SELECT NEEDS
    ═══════════════════════════════ */
    #screen-needs { background: #FFF8F0; }

    .emotion-pill {
      align-self: center;
      display: inline-flex; align-items: center; gap: 10px;
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 26px; font-weight: 800;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      margin-bottom: 18px;
    }

    .needs-grid {
      display: flex; flex-wrap: wrap;
      gap: 14px; justify-content: center;
      margin-bottom: 20px;
    }

    .need-btn {
      min-height: 80px; padding: 16px 26px;
      background: white; color: #333;
      border: 4px solid transparent;
      border-radius: 20px;
      font-size: 26px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
      transition: transform 0.14s, box-shadow 0.14s, background 0.14s, border-color 0.14s;
      user-select: none;
    }
    .need-btn:active { transform: scale(0.94); }
    .need-btn.selected {
      transform: scale(1.06);
      box-shadow: 0 6px 22px rgba(0,0,0,0.18);
    }

    .want-display {
      background: white; border-radius: 18px;
      padding: 18px 22px;
      font-size: 28px; font-weight: 800; color: #333;
      text-align: center; min-height: 70px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 20px; line-height: 1.4;
    }

    .next-btn {
      display: none; align-self: center;
      min-height: 84px; width: 100%; max-width: 380px;
      background: #2ECC71; color: white;
      font-size: 32px; font-weight: 900;
      font-family: inherit; border: none;
      border-radius: 26px; cursor: pointer;
      box-shadow: 0 6px 22px rgba(46,204,113,0.38);
      transition: transform 0.14s, box-shadow 0.14s;
    }
    .next-btn:active {
      transform: scale(0.96);
      box-shadow: 0 3px 10px rgba(46,204,113,0.38);
    }

    /* ═══════════════════════════════
       STEP 4 — SAY FULL SENTENCE
    ═══════════════════════════════ */
    #screen-say-full { background: #F0F7FF; align-items: center; }
    #screen-say-full .back-btn { align-self: flex-start; }

    .target-card {
      background: white; border-radius: 24px;
      padding: 22px 24px;
      width: 100%; max-width: 640px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.10);
      margin-bottom: 22px;
    }
    .target-card-text {
      flex: 1;
      font-size: 30px; font-weight: 800; color: #333;
      line-height: 1.45;
    }

    /* ═══════════════════════════════
       STEP 5 — CELEBRATION
    ═══════════════════════════════ */
    #screen-celebration {
      background: linear-gradient(145deg, #764ba2 0%, #667eea 100%);
      align-items: center; justify-content: center;
      position: relative; overflow: hidden; gap: 22px;
    }
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .cel-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 22px;
      width: 100%; padding: 10px 0;
    }
    .cel-title {
      font-size: 52px; font-weight: 900;
      color: white; text-align: center;
      text-shadow: 0 3px 14px rgba(0,0,0,0.2);
    }
    .cel-sub {
      font-size: 30px; font-weight: 800;
      color: rgba(255,255,255,0.92); text-align: center;
    }
    .cel-sentence-box {
      background: white; border-radius: 26px;
      padding: 28px 32px;
      max-width: 620px; width: 100%;
      box-shadow: 0 12px 42px rgba(0,0,0,0.22);
      text-align: center;
    }
    .cel-sentence-text {
      font-size: 34px; font-weight: 800;
      color: #333; line-height: 1.45;
    }
    .start-again-btn {
      min-height: 84px; padding: 18px 48px;
      background: white; color: #764ba2;
      font-size: 30px; font-weight: 900;
      font-family: inherit; border: none;
      border-radius: 26px; cursor: pointer;
      box-shadow: 0 6px 22px rgba(0,0,0,0.2);
      transition: transform 0.14s;
    }
    .start-again-btn:active { transform: scale(0.95); }

    /* ── RESPONSIVE ── */
    @media (max-width: 430px) {
      .card-emoji      { font-size: 50px; }
      .card-label      { font-size: 22px; }
      .emotion-card    { min-height: 130px; }
      .question-text   { font-size: 28px; }
      .target-card-text{ font-size: 24px; }
      .cel-title       { font-size: 40px; }
      .cel-sentence-text{ font-size: 26px; }
    }
    @media (min-width: 768px) {
      .screen         { padding: 30px 48px 44px; }
      .emotion-card   { min-height: 180px; }
      .card-emoji     { font-size: 80px; }
      .card-label     { font-size: 30px; }
      .question-text  { font-size: 42px; }
      .target-card-text{ font-size: 34px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     STEP 1 — HOME (emotion picker)
══════════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <h1 class="home-title">Hi Matthew! 👋</h1>
    <button class="icon-btn" onclick="speak('Hi Matthew! How are you feeling today?')" title="Hear this">🔊</button>
  </div>
  <p class="home-sub">How are you feeling?</p>

  <div class="emotion-grid-top">
    <button class="emotion-card happy" onclick="selectEmotion('happy')">
      <span class="card-emoji">😄</span><span class="card-label">Happy</span>
    </button>
    <button class="emotion-card sad" onclick="selectEmotion('sad')">
      <span class="card-emoji">😢</span><span class="card-label">Sad</span>
    </button>
    <button class="emotion-card angry" onclick="selectEmotion('angry')">
      <span class="card-emoji">😠</span><span class="card-label">Angry</span>
    </button>
  </div>
  <div class="emotion-grid-bottom">
    <button class="emotion-card tired" onclick="selectEmotion('tired')">
      <span class="card-emoji">😴</span><span class="card-label">Tired</span>
    </button>
    <button class="emotion-card sick" onclick="selectEmotion('sick')">
      <span class="card-emoji">🤒</span><span class="card-label">Sick</span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════
     STEP 2 — SAY EMOTION
══════════════════════════════════════ -->
<div id="screen-say-emotion" class="screen">
  <button class="back-btn" onclick="goHome()">← Back</button>

  <div class="question-row">
    <span class="question-text">Tell me how you feel</span>
    <button class="icon-btn" onclick="speak('Tell me how you feel')" title="Hear the question">🔊</button>
  </div>

  <div class="feel-prompt" id="s2-feel-prompt"></div>

  <div class="attempt-pill" id="s2-attempt"></div>

  <div class="mic-section">
    <p class="mic-label" id="s2-mic-label">Tap to speak</p>
    <button class="mic-btn" id="s2-mic-btn" onclick="s2TapMic()">🎙️</button>
    <p class="rec-status" id="s2-status"></p>
    <div class="action-row">
      <button class="action-btn btn-retry" id="s2-try-again"
              onclick="s2TryAgain()" style="display:none">Try again 🔄</button>
      <button class="action-btn btn-override"
              onclick="s2Override()">That's right ✓</button>
      <button class="action-btn btn-notyet"
              onclick="s2NotYet()">Let's try again</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     STEP 3 — SELECT NEEDS
══════════════════════════════════════ -->
<div id="screen-needs" class="screen">
  <button class="back-btn" onclick="goToSayEmotion()">← Back</button>

  <div id="n-emotion-pill" class="emotion-pill"></div>

  <div class="question-row">
    <span class="question-text">What do you want?</span>
    <button class="icon-btn" onclick="speak('What do you want?')" title="Hear the question">🔊</button>
  </div>

  <div class="needs-grid" id="n-needs-grid"></div>
  <div class="want-display" id="n-want-display"></div>
  <div class="attempt-pill" id="s3-attempt"></div>
  <div class="mic-section" id="n-mic-section" style="display:none">
    <p class="mic-label" id="s3-mic-label">Tap to speak</p>
    <button class="mic-btn" id="s3-mic-btn" onclick="s3TapMic()">🎙️</button>
    <p class="rec-status" id="s3-status"></p>
    <div class="action-row">
      <button class="action-btn btn-retry" id="s3-try-again"
              onclick="s3TryAgain()" style="display:none">Try again 🔄</button>
      <button class="action-btn btn-override"
              onclick="s3Override()">That's right ✓</button>
      <button class="action-btn btn-notyet"
              onclick="s3NotYet()">Let's try again</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     STEP 4 — SAY FULL SENTENCE
══════════════════════════════════════ -->
<div id="screen-say-full" class="screen">
  <button class="back-btn" onclick="goBackToNeeds()">← Back</button>

  <div class="question-row">
    <span class="question-text">Tell me again, how are you feeling and what do you want?</span>
    <button class="icon-btn" onclick="speak('Tell me again, how are you feeling and what do you want?')" title="Hear the question">🔊</button>
  </div>

  <div class="feel-prompt" id="s4-full-prompt"></div>

  <div class="attempt-pill" id="s4-attempt"></div>

  <div class="mic-section">
    <p class="mic-label" id="s4-mic-label">Tap to speak</p>
    <button class="mic-btn" id="s4-mic-btn" onclick="s4TapMic()">🎙️</button>
    <p class="rec-status" id="s4-status"></p>
    <div class="action-row">
      <button class="action-btn btn-retry" id="s4-try-again"
              onclick="s4TryAgain()" style="display:none">Try again 🔄</button>
      <button class="action-btn btn-override"
              onclick="s4Override()">That's right ✓</button>
      <button class="action-btn btn-notyet"
              onclick="s4NotYet()">Let's try again</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     STEP 5 — CELEBRATION
══════════════════════════════════════ -->
<div id="screen-celebration" class="screen">
  <canvas id="confetti-canvas"></canvas>
  <div class="cel-content">
    <div class="cel-title">🎉 Well done! 🎉</div>
    <div class="cel-sub">Thanks Matthew! Good job saying how you feel.<br>Now we can help you.</div>
    <div class="cel-sentence-box">
      <div class="cel-sentence-text" id="cel-sentence"></div>
    </div>
    <button class="start-again-btn" onclick="goHome()">Start again 🏠</button>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const EMOTIONS = {
  happy: {
    label: 'happy', emoji: '😄',
    bg: '#FFD700', fg: '#7A5C00',
    needs: ['happy cuddles', 'happy dance'],
  },
  sad: {
    label: 'sad', emoji: '😢',
    bg: '#4A90D9', fg: '#ffffff',
    needs: ['hug', 'talk now', 'bedroom', 'alone time'],
  },
  angry: {
    label: 'angry', emoji: '😠',
    bg: '#E74C3C', fg: '#ffffff',
    needs: ['bedroom', 'alone time', 'talk later'],
  },
  tired: {
    label: 'tired', emoji: '😴',
    bg: '#9B59B6', fg: '#ffffff',
    needs: ['rest', 'nap', 'bedroom', 'alone time'],
  },
  sick: {
    label: 'sick', emoji: '🤒',
    bg: '#27AE60', fg: '#ffffff',
    needs: ['medicine', 'rest', 'nap', 'water', 'bedroom', 'alone time'],
  },
};

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let currentEmotion = null;
let selectedNeeds  = [];

// ══════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════
function qs(id) { return document.getElementById(id); }

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function capitalise(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ══════════════════════════════════════
// VOICE / SPEECH SYNTHESIS
// ══════════════════════════════════════
let voices = [];
function loadVoices() { voices = speechSynthesis.getVoices(); }
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function pickVoice() {
  for (const n of ['Karen','Samantha','Moira','Tessa','Daniel']) {
    const v = voices.find(v => v.name.includes(n));
    if (v) return v;
  }
  return voices.find(v => v.lang && v.lang.startsWith('en')) || null;
}

function cancelSpeech() {
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function speak(text, onEnd) {
  cancelSpeech();
  const u = new SpeechSynthesisUtterance(text);
  u.voice  = pickVoice();
  u.rate   = 0.88;
  u.pitch  = 1.1;
  u.volume = 1;
  if (onEnd) {
    let fired = false;
    const done = () => { if (!fired) { fired = true; onEnd(); } };
    u.onend   = done;
    u.onerror = done;
    // Generous fallback: ~150ms per character at rate 0.88, plus 1.5s buffer
    setTimeout(done, Math.max(3000, (text.length * 65)) + 1500);
  }
  setTimeout(() => speechSynthesis.speak(u), 80);
}

function speakFeel() { speak(`I feel ${currentEmotion}.`); }
function speakFull()  { speak(buildSentence()); }

// ══════════════════════════════════════
// SENTENCE BUILDER
// ══════════════════════════════════════
function buildSentence() {
  if (!selectedNeeds.length) return `I feel ${currentEmotion}.`;
  return `I feel ${currentEmotion}. I want ${selectedNeeds.join(' and ')}.`;
}

// ══════════════════════════════════════
// SPEECH ASSESSMENT
// ══════════════════════════════════════
function normalizeText(text) {
  return (text || '').toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
}

function editDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}

function similarityScore(a, b) {
  if (!a && !b) return 1;
  const dist = editDistance(a, b);
  return 1 - (dist / Math.max(a.length, b.length, 1));
}

const STOP_WORDS = new Set([
  'i','a','an','the','to','my','and','is','am','are',
  'want','feel','feeling','like','do','you','your'
]);

function contentWords(text) {
  return normalizeText(text).split(' ')
    .filter(w => w.length > 0 && !STOP_WORDS.has(w));
}

function nearCoverage(heard, target) {
  const heardWords = normalizeText(heard).split(' ').filter(w => w.length > 0);
  const targetKw   = contentWords(target);
  if (targetKw.length === 0) return 1;
  let covered = 0;
  for (const tw of targetKw) {
    const best = heardWords.reduce((mx, hw) => Math.max(mx, similarityScore(hw, tw)), 0);
    if (best >= 0.65) covered++;
  }
  return covered / targetKw.length;
}

function judgePhrase(heard, target) {
  const ps = similarityScore(normalizeText(heard), normalizeText(target));
  const nc = nearCoverage(heard, target);
  if (ps >= 0.65 || nc >= 0.65) return 'got';
  if (ps >= 0.45 || nc >= 0.45) return 'partial';
  return 'noyet';
}

// Step 2: just check the emotion word
function judgeEmotion(heard) {
  const h    = normalizeText(heard).split(' ');
  const em   = normalizeText(currentEmotion);
  const best = h.reduce((mx, w) => Math.max(mx, similarityScore(w, em)), 0);
  return best >= 0.65 ? 'got' : 'noyet';
}

// Step 4: check full sentence
function judgeSentence(heard) {
  return judgePhrase(heard, buildSentence());
}

// ══════════════════════════════════════
// MIC SESSION FACTORY
// Creates one recording session; resolves after silence or max restarts.
// maxInternalRestarts: how many times to auto-restart when browser stops
//   (Step2: 2 restarts = 3 total launches, Step4: 3 restarts = 4 total launches)
// ══════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
const SILENCE_MS = 2500;

function startMicSession({ maxInternalRestarts = 1, onInterim, onDone, onPermError }) {
  let accumulated     = '';
  let restarted       = 0;
  let active          = true;
  let silenceTimer    = null;
  let currentR        = null;
  let intentionalStop = false; // set when WE call stop() via silence timer — skip restart
  let hasSpeech       = false; // set on first onresult
  let launchTime      = 0;    // timestamp of most recent launch(), for min-duration padding

  // Minimum time a launch is allowed to run before we count it as a real attempt.
  // Prevents browsers that fire onend in <100ms from burning through all restarts instantly.
  const MIN_LAUNCH_MS = 2000;

  function finalize() {
    if (!active) return;
    active = false;
    clearTimeout(silenceTimer);
    onDone(accumulated.trim());
  }

  function stopSilenceTimer() { clearTimeout(silenceTimer); }

  function resetSilenceTimer() {
    stopSilenceTimer();
    silenceTimer = setTimeout(() => {
      if (active && currentR) {
        intentionalStop = true;
        try { currentR.stop(); } catch(e) {}
      }
    }, SILENCE_MS);
  }

  function tryRestart() {
    if (!active) return;
    if (restarted < maxInternalRestarts) {
      restarted++;
      // Pad the delay so each cycle lasts at least MIN_LAUNCH_MS.
      // If the browser fired onend in 50ms, we wait ~1950ms before retrying.
      const elapsed = Date.now() - launchTime;
      const delay   = Math.max(200, MIN_LAUNCH_MS - elapsed);
      setTimeout(launch, delay);
    } else {
      finalize();
    }
  }

  function launch() {
    if (!active) return;
    launchTime      = Date.now();
    intentionalStop = false;
    const r = new SR();
    currentR = r;
    r.continuous      = true;
    r.interimResults  = true;
    r.lang            = 'en-AU';
    r.maxAlternatives = 3;

    r.onresult = (ev) => {
      hasSpeech = true;
      resetSilenceTimer(); // reset 2.5s silence window on every new fragment
      let newFinal = '', newInterim = '';
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const t = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) newFinal += t + ' ';
        else newInterim = t;
      }
      if (newFinal) accumulated += newFinal;
      if (onInterim) onInterim((accumulated + newInterim).trim());
    };

    r.onend = () => {
      stopSilenceTimer();
      if (!active) return;
      if (intentionalStop) {
        // Silence timer fired — Matthew has stopped speaking, assess now
        finalize();
      } else {
        // Browser stopped unexpectedly (no-speech timeout, network blip, etc.)
        // Restart so Matthew has more time to begin or continue speaking
        tryRestart();
      }
    };

    r.onerror = (ev) => {
      stopSilenceTimer();
      if (!active) return;
      if (ev.error === 'aborted') return;
      if (ev.error === 'not-allowed') {
        active = false;
        if (onPermError) onPermError();
        return;
      }
      tryRestart();
    };

    try { r.start(); } catch(e) {}
  }

  launch();

  return {
    abort() {
      active = false;
      clearTimeout(silenceTimer);
      if (currentR) { try { currentR.abort(); } catch(e) {} }
      currentR = null;
    }
  };
}

let s2Attempts = 0;
let s2Session  = null;
let s2AutoTimer = null;
const S2_MAX_ATTEMPTS = 3;
const S2_MAX_RESTARTS = 4; // 5 total launches per human attempt

function s2Reset() {
  s2Abort();
  s2Attempts = 0;
  qs('s2-attempt').textContent = '';
  qs('s2-status').textContent  = '';
  qs('s2-try-again').style.display = 'none';
  qs('s2-mic-btn').classList.remove('listening');
  qs('s2-mic-btn').disabled    = false;
  qs('s2-mic-label').textContent = 'Tap to speak';
}

function s2Abort() {
  clearTimeout(s2AutoTimer);
  if (s2Session) { s2Session.abort(); s2Session = null; }
}

function s2SetListening(on) {
  qs('s2-mic-btn').classList.toggle('listening', on);
  qs('s2-mic-btn').disabled = on;
  qs('s2-mic-label').textContent = on ? 'Listening… 🎙️' : 'Tap to speak';
}

function s2TapMic() {
  if (!SR) {
    qs('s2-status').textContent = 'Speech recognition not available — use the ✓ button.';
    qs('s2-try-again').style.display = 'inline-flex';
    return;
  }
  s2Abort();
  s2RunAttempt();
}

function s2RunAttempt() {
  s2Attempts++;
  qs('s2-attempt').textContent = `Try ${s2Attempts} of ${S2_MAX_ATTEMPTS}`;
  qs('s2-status').textContent  = '';
  qs('s2-try-again').style.display = 'none';
  s2SetListening(true);

  s2Session = startMicSession({
    maxInternalRestarts: S2_MAX_RESTARTS,
    onInterim: (t) => { qs('s2-status').textContent = t; },
    onDone:    (transcript) => {
      s2Session = null;
      s2SetListening(false);
      s2HandleResult(transcript);
    },
    onPermError: () => {
      s2SetListening(false);
      qs('s2-status').textContent = 'Microphone not allowed. Allow it in browser settings, then tap Try again.';
      qs('s2-try-again').style.display = 'inline-flex';
    },
  });
}

function s2HandleResult(transcript) {
  const correct = transcript && judgeEmotion(transcript) === 'got';

  if (correct) {
    qs('s2-status').textContent = '✅ Amazing!';
    qs('s2-try-again').style.display = 'none';
    speak(`Amazing, Matthew! You said I feel ${currentEmotion}! Great job!`, () => {
      goToNeeds();
    });
    return;
  }

  // Incorrect
  if (transcript) {
    qs('s2-status').textContent = `I heard: "${transcript}"`;
  } else {
    qs('s2-status').textContent = "I didn't quite catch that.";
  }

  if (s2Attempts < S2_MAX_ATTEMPTS) {
    const msg = s2Attempts === 1
      ? "Good try! Can you say it again?"
      : "Let's try one more time, Matthew!";
    qs('s2-try-again').style.display = 'inline-flex';
    speak(msg);
  } else {
    // 3 attempts done — advance anyway
    qs('s2-try-again').style.display = 'none';
    speak("Well done for trying, Matthew!", () => {
      goToNeeds();
    });
  }
}

function s2TryAgain() {
  s2Abort();
  cancelSpeech();
  if (s2Attempts >= S2_MAX_ATTEMPTS) {
    // exhausted — still allow manual retry beyond limit
    s2Attempts = S2_MAX_ATTEMPTS - 1;
  }
  qs('s2-try-again').style.display = 'none';
  qs('s2-status').textContent = '';
  s2RunAttempt();
}

function s2Override() {
  s2Abort(); cancelSpeech();
  speak("Oops, that was actually right! Well done, Matthew!", () => goToNeeds());
}

function s2NotYet() {
  s2Abort(); cancelSpeech();

  qs('s2-status').textContent  = '';
  qs('s2-try-again').style.display = 'none';

  speak("That's ok, let's try again, Matthew!");
}

function buildNeedsScreen() {

    btn.dataset.need = need;
    btn.onclick = () => toggleNeed(need, btn, e.bg);

  qs('n-mic-section').style.display = 'none';

function toggleNeed(need, btn, bg) {
  const idx = selectedNeeds.indexOf(need);
  if (idx === -1) {
    selectedNeeds.push(need);
    btn.classList.add('selected');
    btn.style.borderColor = bg;
    btn.style.background  = hexAlpha(bg, 0.12);
  } else {
    selectedNeeds.splice(idx, 1);
    btn.classList.remove('selected');
    btn.style.borderColor = 'transparent';
    btn.style.background  = 'white';
  }
  qs('n-want-display').textContent =
    selectedNeeds.length ? `I want ${selectedNeeds.join(' and ')}.` : '';
  const hasSel = selectedNeeds.length > 0;
  qs('n-mic-section').style.display = hasSel ? 'flex' : 'none';
  if (hasSel) s3Reset(); else s3Abort();
}

// ══════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════
function launchConfetti() {
  const canvas = qs('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4',
                  '#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE'];
  const pieces = Array.from({length: 140}, () => ({
    x:      Math.random() * canvas.width,
    y:      -20 - Math.random() * 280,
    w:      9  + Math.random() * 13,
    h:      9  + Math.random() * 13,
    color:  COLORS[Math.floor(Math.random() * COLORS.length)],
    rot:    Math.random() * 360,
    rotSpd: (Math.random() - 0.5) * 9,
    vy:     3.5 + Math.random() * 5,
    vx:     (Math.random() - 0.5) * 3,
    alive:  true,
  }));

  let raf;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let any = false;
    pieces.forEach(p => {
      if (!p.alive) return;
      p.y += p.vy; p.x += p.vx; p.rot += p.rotSpd;
      if (p.y > canvas.height + 30) { p.alive = false; return; }
      any = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (any) raf = requestAnimationFrame(draw);
  }
  draw();

  const screen = qs('screen-celebration');
  const obs = new MutationObserver(() => {
    if (!screen.classList.contains('active')) {
      cancelAnimationFrame(raf);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      obs.disconnect();
    }
  });
  obs.observe(screen, { attributes: true, attributeFilter: ['class'] });
}
