<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Matthew's Feelings App</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --happy:  #FFD700;
      --happy-text: #7A5C00;
      --sad:    #4A90D9;
      --sad-text: #fff;
      --angry:  #E74C3C;
      --angry-text: #fff;
      --tired:  #9B59B6;
      --tired-text: #fff;
      --sick:   #27AE60;
      --sick-text: #fff;
    }

    html, body {
      min-height: 100%;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      background: #FFF8F0;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      min-height: 100dvh;
      flex-direction: column;
      padding: 20px 20px 32px;
      animation: fadeUp 0.35s ease both;
    }
    .screen.active { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SHARED ── */
    .back-btn {
      align-self: flex-start;
      background: rgba(0,0,0,0.08);
      border: none;
      font-size: 22px;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      color: #555;
      font-family: inherit;
      margin-bottom: 12px;
      transition: background 0.18s;
    }
    .back-btn:active { background: rgba(0,0,0,0.18); }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 38px;
      padding: 8px;
      border-radius: 50%;
      line-height: 1;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .icon-btn:active { transform: scale(0.82); }

    /* ═══════════════════════════════
       HOME SCREEN
    ═══════════════════════════════ */
    #screen-home {
      background: linear-gradient(160deg, #FFF8F0 0%, #FFE9D0 100%);
      align-items: center;
    }

    .home-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .home-title {
      font-size: 40px;
      font-weight: 900;
      color: #333;
      text-align: center;
    }

    .home-sub {
      font-size: 26px;
      color: #666;
      font-weight: 600;
      text-align: center;
      margin-bottom: 28px;
    }

    .emotion-grid-top {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 16px;
    }

    .emotion-grid-bottom {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 452px;
    }

    .emotion-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      border-radius: 26px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 22px rgba(0,0,0,0.13);
      padding: 18px 10px;
      transition: transform 0.14s, box-shadow 0.14s;
      user-select: none;
    }
    .emotion-card:active {
      transform: scale(0.93);
      box-shadow: 0 3px 10px rgba(0,0,0,0.13);
    }

    .card-emoji { font-size: 64px; line-height: 1.15; margin-bottom: 8px; }
    .card-label { font-size: 26px; font-weight: 800; }

    .emotion-card.happy { background: var(--happy); color: var(--happy-text); }
    .emotion-card.sad   { background: var(--sad);   color: var(--sad-text);   }
    .emotion-card.angry { background: var(--angry); color: var(--angry-text); }
    .emotion-card.tired { background: var(--tired); color: var(--tired-text); }
    .emotion-card.sick  { background: var(--sick);  color: var(--sick-text);  }

    /* ═══════════════════════════════
       I FEEL SCREEN
    ═══════════════════════════════ */
    #screen-feel {
      background: #FFF8F0;
    }

    .feel-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-radius: 24px;
      padding: 22px 28px;
      margin-bottom: 22px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.1);
    }

    .feel-banner-text {
      font-size: 44px;
      font-weight: 900;
      line-height: 1.15;
    }

    .section-label {
      font-size: 28px;
      font-weight: 800;
      color: #444;
      text-align: center;
      margin-bottom: 16px;
    }

    .needs-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .need-btn {
      min-height: 80px;
      padding: 16px 26px;
      background: white;
      color: #333;
      border: 4px solid transparent;
      border-radius: 20px;
      font-size: 26px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
      transition: transform 0.14s, box-shadow 0.14s, background 0.14s, border-color 0.14s;
      user-select: none;
    }
    .need-btn:active { transform: scale(0.94); }
    .need-btn.selected { transform: scale(1.06); box-shadow: 0 6px 22px rgba(0,0,0,0.18); }

    .want-display {
      background: white;
      border-radius: 18px;
      padding: 18px 22px;
      font-size: 28px;
      font-weight: 800;
      color: #333;
      text-align: center;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .next-btn {
      display: none;
      align-self: center;
      min-height: 84px;
      width: 100%;
      max-width: 380px;
      background: #2ECC71;
      color: white;
      font-size: 32px;
      font-weight: 900;
      font-family: inherit;
      border: none;
      border-radius: 26px;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(46,204,113,0.38);
      transition: transform 0.14s, box-shadow 0.14s;
    }
    .next-btn:active {
      transform: scale(0.96);
      box-shadow: 0 3px 10px rgba(46,204,113,0.38);
    }

    /* ═══════════════════════════════
       SAY IT SCREEN
    ═══════════════════════════════ */
    #screen-sayit {
      background: #F0F7FF;
      align-items: center;
    }

    #screen-sayit .back-btn { align-self: flex-start; }

    .sayit-title {
      font-size: 34px;
      font-weight: 900;
      color: #333;
      text-align: center;
      margin-bottom: 18px;
    }

    .sentence-card {
      background: white;
      border-radius: 24px;
      padding: 26px 24px;
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.10);
      margin-bottom: 30px;
    }

    .sentence-card-text {
      flex: 1;
      font-size: 32px;
      font-weight: 800;
      color: #333;
      line-height: 1.45;
    }

    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .mic-label {
      font-size: 26px;
      font-weight: 700;
      color: #555;
    }

    .mic-btn {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      background: #E74C3C;
      border: none;
      font-size: 64px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(231,76,60,0.38);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.14s;
      line-height: 1;
    }
    .mic-btn:active { transform: scale(0.91); }
    .mic-btn.listening {
      background: #C0392B;
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(231,76,60,0.55); }
      70%  { box-shadow: 0 0 0 32px rgba(231,76,60,0); }
      100% { box-shadow: 0 0 0 0   rgba(231,76,60,0); }
    }

    .rec-status {
      font-size: 24px;
      color: #555;
      text-align: center;
      min-height: 36px;
      padding: 0 20px;
      line-height: 1.4;
    }

    .action-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .action-btn {
      min-height: 84px;
      padding: 16px 28px;
      border-radius: 22px;
      font-size: 26px;
      font-weight: 800;
      font-family: inherit;
      border: none;
      cursor: pointer;
      box-shadow: 0 5px 16px rgba(0,0,0,0.15);
      transition: transform 0.14s;
    }
    .action-btn:active { transform: scale(0.94); }
    .action-btn.retry    { background: #FF9800; color: white; }
    .action-btn.override { background: #4CAF50; color: white; }

    /* ═══════════════════════════════
       CELEBRATION SCREEN
    ═══════════════════════════════ */
    #screen-celebration {
      background: linear-gradient(145deg, #764ba2 0%, #667eea 100%);
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      gap: 22px;
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .cel-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 100%;
      padding: 10px 0;
    }

    .cel-title {
      font-size: 52px;
      font-weight: 900;
      color: white;
      text-align: center;
      text-shadow: 0 3px 14px rgba(0,0,0,0.2);
    }

    .cel-sub {
      font-size: 30px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      text-align: center;
    }

    .cel-sentence-box {
      background: white;
      border-radius: 26px;
      padding: 28px 32px;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 12px 42px rgba(0,0,0,0.22);
      text-align: center;
    }

    .cel-sentence-text {
      font-size: 34px;
      font-weight: 800;
      color: #333;
      line-height: 1.45;
    }

    .start-again-btn {
      min-height: 84px;
      padding: 18px 48px;
      background: white;
      color: #764ba2;
      font-size: 30px;
      font-weight: 900;
      font-family: inherit;
      border: none;
      border-radius: 26px;
      cursor: pointer;
      box-shadow: 0 6px 22px rgba(0,0,0,0.2);
      transition: transform 0.14s;
    }
    .start-again-btn:active { transform: scale(0.95); }

    /* ═══════════════════════════════
       RESPONSIVE
    ═══════════════════════════════ */
    @media (max-width: 430px) {
      .card-emoji        { font-size: 50px; }
      .card-label        { font-size: 22px; }
      .emotion-card      { min-height: 130px; }
      .feel-banner-text  { font-size: 34px; }
      .sentence-card-text{ font-size: 26px; }
      .cel-title         { font-size: 40px; }
      .cel-sentence-text { font-size: 26px; }
    }

    @media (min-width: 768px) {
      .screen            { padding: 30px 48px 40px; }
      .emotion-card      { min-height: 180px; }
      .card-emoji        { font-size: 80px; }
      .card-label        { font-size: 30px; }
      .feel-banner-text  { font-size: 52px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     HOME
══════════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <h1 class="home-title">Hi Matthew! 👋</h1>
    <button class="icon-btn" onclick="speak('Hi Matthew! How are you feeling today?')" title="Hear this">🔊</button>
  </div>
  <p class="home-sub">How are you feeling?</p>

  <div class="emotion-grid-top">
    <button class="emotion-card happy" onclick="selectEmotion('happy')">
      <span class="card-emoji">😄</span>
      <span class="card-label">Happy</span>
    </button>
    <button class="emotion-card sad" onclick="selectEmotion('sad')">
      <span class="card-emoji">😢</span>
      <span class="card-label">Sad</span>
    </button>
    <button class="emotion-card angry" onclick="selectEmotion('angry')">
      <span class="card-emoji">😠</span>
      <span class="card-label">Angry</span>
    </button>
  </div>
  <div class="emotion-grid-bottom">
    <button class="emotion-card tired" onclick="selectEmotion('tired')">
      <span class="card-emoji">😴</span>
      <span class="card-label">Tired</span>
    </button>
    <button class="emotion-card sick" onclick="selectEmotion('sick')">
      <span class="card-emoji">🤒</span>
      <span class="card-label">Sick</span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════
     I FEEL
══════════════════════════════════════ -->
<div id="screen-feel" class="screen">
  <button class="back-btn" onclick="goHome()">← Back</button>

  <div class="feel-banner" id="feel-banner">
    <span class="feel-banner-text" id="feel-banner-text">I feel happy 😄</span>
    <button class="icon-btn" id="feel-replay-btn" onclick="speakFeel()" title="Hear it again">🔊</button>
  </div>

  <p class="section-label">What do you want?</p>
  <div class="needs-grid" id="needs-grid"></div>
  <div class="want-display" id="want-display"></div>
  <button class="next-btn" id="next-btn" onclick="goToSayIt()">Next →</button>
</div>

<!-- ══════════════════════════════════════
     SAY IT
══════════════════════════════════════ -->
<div id="screen-sayit" class="screen">
  <button class="back-btn" onclick="goToFeel()">← Back</button>
  <p class="sayit-title">Now say it! 🗣️</p>

  <div class="sentence-card">
    <div class="sentence-card-text" id="sayit-text"></div>
    <button class="icon-btn" onclick="speakFull()" title="Hear the sentence">🔊</button>
  </div>

  <div class="mic-section">
    <p class="mic-label" id="mic-label">Tap the button to speak</p>
    <button class="mic-btn" id="mic-btn" onclick="toggleRecording()">🎙️</button>
    <p class="rec-status" id="rec-status"></p>
    <div class="action-row" id="action-row" style="display:none">
      <button class="action-btn retry"    onclick="resetMic()">Try again 🔄</button>
      <button class="action-btn override" onclick="celebrate()">That's right ✓</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     CELEBRATION
══════════════════════════════════════ -->
<div id="screen-celebration" class="screen">
  <canvas id="confetti-canvas"></canvas>
  <div class="cel-content">
    <div class="cel-title">🎉 Amazing! 🎉</div>
    <div class="cel-sub">Great job, Matthew!</div>
    <div class="cel-sentence-box">
      <div class="cel-sentence-text" id="cel-sentence"></div>
    </div>
    <button class="start-again-btn" onclick="goHome()">Start again 🏠</button>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const EMOTIONS = {
  happy: {
    label: 'happy', emoji: '😄',
    bg: '#FFD700', text: '#7A5C00',
    needs: ['Happy dance', 'Happy cuddles'],
  },
  sad: {
    label: 'sad', emoji: '😢',
    bg: '#4A90D9', text: '#ffffff',
    needs: ['A hug', 'Talk now', 'Talk later', 'Alone time'],
  },
  angry: {
    label: 'angry', emoji: '😠',
    bg: '#E74C3C', text: '#ffffff',
    needs: ['Alone time', 'Talk later'],
  },
  tired: {
    label: 'tired', emoji: '😴',
    bg: '#9B59B6', text: '#ffffff',
    needs: ['Rest', 'A nap', 'Alone time'],
  },
  sick: {
    label: 'sick', emoji: '🤒',
    bg: '#27AE60', text: '#ffffff',
    needs: ['Medicine', 'Rest', 'A nap', 'Water', 'Alone time'],
  },
};

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let currentEmotion = null;
let selectedNeeds  = [];
let recogniser     = null;
let isListening    = false;

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  // Force reflow so animation reruns
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = '';
  el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function goHome() {
  haltRecognition();
  cancelSpeech();
  currentEmotion = null;
  selectedNeeds  = [];
  showScreen('screen-home');
  setTimeout(() => speak('Hi Matthew! How are you feeling today?'), 400);
}

function goToFeel() {
  haltRecognition();
  showScreen('screen-feel');
}

function goToSayIt() {
  showScreen('screen-sayit');
  const sentence = buildSentence();
  document.getElementById('sayit-text').textContent = sentence;
  resetMicUI();
  setTimeout(() => speakFull(), 400);
}

// ══════════════════════════════════════
// EMOTION SELECTION
// ══════════════════════════════════════
function selectEmotion(name) {
  const e = EMOTIONS[name];
  currentEmotion = name;
  selectedNeeds  = [];

  // Update banner
  const banner = document.getElementById('feel-banner');
  banner.style.background = e.bg;
  banner.style.color      = e.text;
  document.getElementById('feel-banner-text').textContent = `I feel ${e.label} ${e.emoji}`;
  document.getElementById('feel-replay-btn').style.color = e.text;

  // Build need buttons
  const grid = document.getElementById('needs-grid');
  grid.innerHTML = '';
  e.needs.forEach(need => {
    const btn = document.createElement('button');
    btn.className = 'need-btn';
    btn.textContent = need;
    btn.dataset.need = need;
    btn.onclick = () => toggleNeed(need, btn, e.bg);
    grid.appendChild(btn);
  });

  updateWantDisplay();
  document.getElementById('next-btn').style.display = 'none';
  showScreen('screen-feel');
  setTimeout(() => speakFeel(), 350);
}

function toggleNeed(need, btn, emotionBg) {
  const idx = selectedNeeds.indexOf(need);
  if (idx === -1) {
    selectedNeeds.push(need);
    btn.classList.add('selected');
    btn.style.borderColor = emotionBg;
    btn.style.background  = hexAlpha(emotionBg, 0.12);
  } else {
    selectedNeeds.splice(idx, 1);
    btn.classList.remove('selected');
    btn.style.borderColor = 'transparent';
    btn.style.background  = 'white';
  }
  updateWantDisplay();
  document.getElementById('next-btn').style.display = selectedNeeds.length > 0 ? 'block' : 'none';
}

function updateWantDisplay() {
  const box = document.getElementById('want-display');
  if (selectedNeeds.length === 0) {
    box.textContent = '';
  } else {
    box.textContent = `I want ${selectedNeeds.join(' and ')}.`;
  }
}

function buildSentence() {
  return `I feel ${currentEmotion}. I want ${selectedNeeds.join(' and ')}.`;
}

// ══════════════════════════════════════
// SPEECH SYNTHESIS
// ══════════════════════════════════════
function cancelSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function speak(text, onEnd) {
  cancelSpeech();
  const u = new SpeechSynthesisUtterance(text);
  u.rate   = 0.85;
  u.pitch  = 1.08;
  u.volume = 1;
  if (onEnd) u.onend = onEnd;
  // Small delay ensures cancel() clears the queue first
  setTimeout(() => window.speechSynthesis.speak(u), 80);
}

function speakFeel() { speak(`I feel ${currentEmotion}.`); }
function speakFull()  { speak(buildSentence()); }

// ══════════════════════════════════════
// SPEECH RECOGNITION
// ══════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;

function buildKeywords() {
  const words = new Set();
  words.add(currentEmotion.toLowerCase());
  selectedNeeds.forEach(need => {
    need.toLowerCase().split(/\s+/).forEach(w => { if (w.length > 2) words.add(w); });
  });
  return [...words];
}

function isMatch(transcript) {
  const t = transcript.toLowerCase();
  const kw = buildKeywords();
  const hits = kw.filter(k => t.includes(k)).length;
  // Pass if emotion word is present OR ≥40% of keywords match
  return t.includes(currentEmotion.toLowerCase()) || hits >= Math.max(1, Math.floor(kw.length * 0.4));
}

function toggleRecording() {
  if (isListening) { haltRecognition(); return; }
  startRecognition();
}

function startRecognition() {
  cancelSpeech();

  if (!SR) {
    document.getElementById('rec-status').textContent = 'Speech recognition not available on this device.';
    document.getElementById('action-row').style.display = 'flex';
    return;
  }

  recogniser = new SR();
  recogniser.continuous      = false;
  recogniser.interimResults  = true;
  recogniser.lang            = 'en-US';
  recogniser.maxAlternatives = 5;

  const micBtn    = document.getElementById('mic-btn');
  const micLabel  = document.getElementById('mic-label');
  const status    = document.getElementById('rec-status');
  const actionRow = document.getElementById('action-row');

  isListening = true;
  micBtn.classList.add('listening');
  micLabel.textContent = 'Listening… 🎙️';
  status.textContent   = '';
  actionRow.style.display = 'none';

  let bestFinal = '';

  recogniser.onresult = (ev) => {
    let interim = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const t = ev.results[i][0].transcript;
      if (ev.results[i].isFinal) bestFinal += t;
      else interim = t;
    }
    status.textContent = bestFinal || interim;
  };

  recogniser.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micLabel.textContent = 'Tap the button to speak';

    if (bestFinal && isMatch(bestFinal)) {
      status.textContent = '✅ Got it!';
      setTimeout(() => celebrate(), 700);
    } else {
      status.textContent = bestFinal
        ? `I heard: "${bestFinal}" — want to try again?`
        : "I didn't catch that — want to try again?";
      actionRow.style.display = 'flex';
    }
  };

  recogniser.onerror = (ev) => {
    isListening = false;
    micBtn.classList.remove('listening');
    micLabel.textContent = 'Tap the button to speak';
    if (ev.error === 'no-speech') {
      status.textContent = "I didn't hear anything — try again!";
    } else if (ev.error === 'not-allowed') {
      status.textContent = 'Microphone blocked — use the ✓ button.';
    } else {
      status.textContent = 'Something went wrong — try again!';
    }
    document.getElementById('action-row').style.display = 'flex';
  };

  recogniser.start();
}

function haltRecognition() {
  if (recogniser && isListening) {
    recogniser.abort();
    isListening = false;
  }
}

function resetMic() {
  resetMicUI();
  startRecognition();
}

function resetMicUI() {
  const micBtn    = document.getElementById('mic-btn');
  const micLabel  = document.getElementById('mic-label');
  const status    = document.getElementById('rec-status');
  const actionRow = document.getElementById('action-row');
  micBtn.classList.remove('listening');
  micLabel.textContent    = 'Tap the button to speak';
  status.textContent      = '';
  actionRow.style.display = 'none';
}

// ══════════════════════════════════════
// CELEBRATION
// ══════════════════════════════════════
function celebrate() {
  haltRecognition();
  const sentence = buildSentence();
  document.getElementById('cel-sentence').textContent = sentence;
  showScreen('screen-celebration');
  launchConfetti();
  setTimeout(() => speak('Thanks for telling me, Matthew! Great job!'), 600);
}

// ══════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4',
                  '#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE'];
  const pieces = Array.from({ length: 130 }, () => ({
    x:       Math.random() * canvas.width,
    y:       -20 - Math.random() * 250,
    w:       9  + Math.random() * 12,
    h:       9  + Math.random() * 12,
    color:   COLORS[Math.floor(Math.random() * COLORS.length)],
    rot:     Math.random() * 360,
    rotSpd:  (Math.random() - 0.5) * 9,
    vy:      3.5 + Math.random() * 5,
    vx:      (Math.random() - 0.5) * 3,
    alive:   true,
  }));

  let raf;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let anyAlive = false;
    pieces.forEach(p => {
      if (!p.alive) return;
      p.y   += p.vy;
      p.x   += p.vx;
      p.rot += p.rotSpd;
      if (p.y > canvas.height + 30) { p.alive = false; return; }
      anyAlive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    if (anyAlive) raf = requestAnimationFrame(draw);
  }
  draw();

  // Clean up if user navigates away
  const screen = document.getElementById('screen-celebration');
  const observer = new MutationObserver(() => {
    if (!screen.classList.contains('active')) {
      cancelAnimationFrame(raf);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      observer.disconnect();
    }
  });
  observer.observe(screen, { attributes: true, attributeFilter: ['class'] });
}

// ══════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
window.addEventListener('load', () => {
  // Warm greeting — may silently fail on locked devices until first user gesture
  setTimeout(() => speak('Hi Matthew! How are you feeling today?'), 800);
});
